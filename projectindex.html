<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Index — Shillim Institute</title>
    <link rel="stylesheet" href="shilim.css">
</head>
<body class="page-projectindex">
    <div class="container container--index">
        <div class="pindex">
            <!-- Selected project details open here, above the list -->
            <div class="pindex-details" id="projectDetails" hidden>
                <button class="pindex-detail-close" onclick="closeDetails()" title="Close details">&times;</button>
                <div id="projectDetailsBody"></div>
            </div>

            <!-- Single-column list of project cards -->
            <div class="pindex-list" id="projectList">
                <!-- Projects will be loaded here -->
            </div>

            <!-- Single search bar, pinned to the bottom -->
            <div class="pindex-searchbar">
                <input type="text" id="searchInput" placeholder="Search projects..." oninput="filterProjects()">
            </div>
        </div>
    </div>

    <script>
        let currentProjects = [];
        let selectedProjectTitle = null;

        function escapeHtml(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function loadProjects() {
            try {
                const response = await fetch('data/projects.json');
                const data = await response.json();
                currentProjects = data.projects || [];
                refreshProjectList();
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projectList').innerHTML =
                    '<div class="pindex-no-results"><h3>Could not load projects</h3></div>';
            }
        }

        function filterProjects() {
            refreshProjectList(document.getElementById('searchInput').value.toLowerCase());
        }

        function refreshProjectList(searchTerm = '') {
            const list = document.getElementById('projectList');
            list.innerHTML = '';

            const filtered = currentProjects.filter(project => {
                return !searchTerm ||
                    (project.title && project.title.toLowerCase().includes(searchTerm)) ||
                    (project.author && project.author.toLowerCase().includes(searchTerm)) ||
                    (project.primarycategory && project.primarycategory.toLowerCase().includes(searchTerm)) ||
                    (project.secondarycategory && project.secondarycategory.toLowerCase().includes(searchTerm)) ||
                    (project.shortdescription && project.shortdescription.toLowerCase().includes(searchTerm)) ||
                    (project.details && project.details.toLowerCase().includes(searchTerm));
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="pindex-no-results"><h3>No projects found</h3><p>Try adjusting your search terms</p></div>';
                return;
            }

            filtered.forEach(project => {
                const card = document.createElement('div');
                card.className = 'pindex-card' + (project.title === selectedProjectTitle ? ' selected' : '');
                card.onclick = () => selectProject(project.title);

                const displayText = project.shortdescription ||
                    (project.details && project.details.length > 140
                        ? project.details.substring(0, 140) + '...'
                        : (project.details || ''));

                const dateDisplay = project.startdate && project.enddate
                    ? `${project.startdate} to ${project.enddate}`
                    : (project.date || '');

                card.innerHTML = `
                    <h3>${escapeHtml(project.title)}</h3>
                    <p class="pindex-card-meta">${escapeHtml(project.author)}</p>
                    <p class="pindex-card-meta">${escapeHtml(dateDisplay)}</p>
                    <p class="pindex-card-desc">${escapeHtml(displayText)}</p>
                `;
                list.appendChild(card);
            });
        }

        function selectProject(title) {
            selectedProjectTitle = title;
            const project = currentProjects.find(p => p.title === title);
            if (!project) return;

            // Highlight the selected card
            document.querySelectorAll('.pindex-card').forEach(card => {
                const h3 = card.querySelector('h3');
                card.classList.toggle('selected', !!h3 && h3.textContent === title);
            });

            const dateDisplay = project.startdate && project.enddate
                ? `${project.startdate} to ${project.enddate}`
                : (project.date || '');

            const shortDescHtml = project.shortdescription
                ? `<div class="pindex-detail-section"><h3>Summary</h3><p>${escapeHtml(project.shortdescription)}</p></div>`
                : '';

            const secondaryTags = (project.secondarycategory || '')
                .split(',')
                .map(c => c.trim())
                .filter(Boolean)
                .map(c => `<span class="tag">${escapeHtml(c)}</span>`)
                .join('');

            const linkHtml = project.link
                ? `<div class="pindex-detail-section"><h3>Project Page</h3>
                       <p><a href="${escapeHtml(project.link)}" target="_blank" rel="noopener">Open project page &rarr;</a></p>
                   </div>`
                : '';

            document.getElementById('projectDetailsBody').innerHTML = `
                <h2>${escapeHtml(project.title)}</h2>
                <div class="pindex-detail-section"><h3>Author</h3><p>${escapeHtml(project.author)}</p></div>
                <div class="pindex-detail-section"><h3>Duration</h3><p>${escapeHtml(dateDisplay)}</p></div>
                <div class="pindex-detail-section">
                    <h3>Categories</h3>
                    <p><span class="tag">${escapeHtml(project.primarycategory)}</span>${secondaryTags}</p>
                </div>
                ${shortDescHtml}
                <div class="pindex-detail-section"><h3>Description</h3><p>${escapeHtml(project.details)}</p></div>
                ${linkHtml}
            `;

            const details = document.getElementById('projectDetails');
            details.hidden = false;
            details.scrollTop = 0;
            details.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeDetails() {
            document.getElementById('projectDetails').hidden = true;
            selectedProjectTitle = null;
            document.querySelectorAll('.pindex-card').forEach(card => card.classList.remove('selected'));
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
