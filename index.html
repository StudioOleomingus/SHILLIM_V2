<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shillim Institute</title>
    <link rel="stylesheet" href="shilim.css">
    <script src="jszip.min.js"></script>
    <script src="gsap.min.js"></script>
    <script src="pixi.min.js"></script>
</head>
<body class="page-index">
    <!-- Mobile redirect overlay -->
    <div class="mobile-redirect">
        <h1>Shillim Institute</h1>
        <p>The interactive archive experience is designed for larger screens. Explore the full project index on your device instead.</p>
        <a href="projectindex.html">Browse the Archive</a>
    </div>

    <div id="app-container"></div>

    <script type="module">
        import { initApp } from './App.js';
        import { LoadTextures } from './Resources.js';

        // Ensure the self-hosted fonts are fully loaded before PixiJS rasterises
        // any text, otherwise glyphs bake with a fallback face and won't refresh.
        async function loadFonts() {
            if (!document || !document.fonts) return;
            const faces = [
                '300 1em "Hind Madurai"', '400 1em "Hind Madurai"', '500 1em "Hind Madurai"',
                '600 1em "Hind Madurai"', '700 1em "Hind Madurai"',
                '400 1em "Gelasio"', 'italic 400 1em "Gelasio"',
                '700 1em "Gelasio"', 'italic 700 1em "Gelasio"',
                '400 1em "IBM Plex Mono"'
            ];
            try { await Promise.all(faces.map((f) => document.fonts.load(f))); } catch (e) { /* noop */ }
            try { await document.fonts.ready; } catch (e) { /* noop */ }
        }

        // Wait for app to be ready
        async function init() {
            await initApp();
            await loadFonts();
            await LoadTextures();
        }

        init().catch(console.error);
    </script>
</body>
</html>
